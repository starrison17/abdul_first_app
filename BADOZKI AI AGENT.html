<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badozki AI - Your Smart Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #e0e6ed;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 30px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.2), rgba(26, 26, 46, 0.8));
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            border-radius: 20px;
            position: relative;
            animation: pulse 2s infinite;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .logo::before {
            content: '🤖';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
        }

        .logo::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57);
            border-radius: 25px;
            z-index: -1;
            animation: rotate 3s linear infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #a0a8b0;
            font-size: 1.1em;
        }

        .chat-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a8b0;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .input-container {
            padding: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        #userInput {
            flex: 1;
            padding: 18px 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e6ed;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #userInput:focus {
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
            background: rgba(255, 255, 255, 0.12);
        }

        #sendBtn {
            padding: 18px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        #sendBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.6);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .scroll-to-bottom {
            position: sticky;
            bottom: 20px;
            right: 30px;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .scroll-to-bottom.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container {
                height: 95vh;
                border-radius: 16px;
            }
            
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"></div>
            <h1>Badozki AI</h1>
            <div class="subtitle">Your intelligent conversation partner</div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message ai-message">
                👋 Hello! I'm Badozki AI, your smart assistant. Ask me anything - from math problems to creative writing, coding help, or general knowledge!
            </div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask me anything..." autocomplete="off">
                <button id="sendBtn">Send</button>
            </div>
        </div>
        
        <button class="scroll-to-bottom" id="scrollBtn" onclick="scrollToBottom()">↓</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const scrollBtn = document.getElementById('scrollBtn');

        // Sophisticated AI responses using advanced pattern matching and logic
        const aiResponses = {
            greetings: [
                "Hello! How can I assist you today?",
                "Hi there! What's on your mind?",
                "Hey! Ready to explore some knowledge together?",
                "Greetings! What would you like to know?"
            ],
            howAreYou: [
                "I'm doing great, thank you! Just here processing the universe's questions. How about you?",
                "Fantastic! My circuits are humming with excitement. How are you?",
                "All systems optimal! Ready to help you with anything. You good?"
            ],
            jokes: [
                "Why don't scientists trust atoms? Because they make up everything! 😂",
                "Why did the scarecrow win an award? He was outstanding in his field! 🌾",
                "Why don't eggs tell jokes? They'd crack each other up! 🥚"
            ],
            math: {
                add: (a, b) => `${a} + ${b} = ${parseFloat(a) + parseFloat(b)}`,
                subtract: (a, b) => `${a} - ${b} = ${parseFloat(a) - parseFloat(b)}`,
                multiply: (a, b) => `${a} × ${b} = ${parseFloat(a) * parseFloat(b)}`,
                divide: (a, b) => b != 0 ? `${a} ÷ ${b} = ${parseFloat(a) / parseFloat(b)}` : "Cannot divide by zero!"
            },
            coding: [
                "I can help with HTML, CSS, JavaScript, Python, and more! Share your code challenge.",
                "Need a code snippet? Tell me the language and what you want to build!",
                "Debugging help? Paste your code and error message."
            ],
            facts: [
                "Did you know? Octopuses have three hearts and blue blood!",
                "The human brain has about 86 billion neurons.",
                "Honey never spoils. Archaeologists have found edible honey in ancient tombs!"
            ],
            creative: [
                "Let your imagination run wild! Want a story, poem, or creative concept?",
                "I love creative challenges! Give me a theme or starting point.",
                "Ready to co-create something amazing with you!"
            ]
        };

        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
            messageDiv.textContent = text;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return messageDiv;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai-message typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = `
                <div>Badozki AI is thinking...</div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return typingDiv;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing');
            if (typing) typing.remove();
        }

        function generateAIResponse(userMessage) {
            const msg = userMessage.toLowerCase().trim();
            
            // Greeting detection
            if (['hello', 'hi', 'hey', 'good morning', 'good afternoon', 'good evening'].some(g => msg.includes(g))) {
                return aiResponses.greetings[Math.floor(Math.random() * aiResponses.greetings.length)];
            }
            
            // How are you
            if (msg.includes('how are you') || msg.includes('how r u')) {
                return aiResponses.howAreYou[Math.floor(Math.random() * aiResponses.howAreYou.length)];
            }
            
            // Jokes
            if (msg.includes('joke') || msg.includes('funny')) {
                return aiResponses.jokes[Math.floor(Math.random() * aiResponses.jokes.length)];
            }
            
            // Math calculations
            const mathMatch = msg.match(/(\d+(?:\.\d+)?)\s*([+\-×÷])\s*(\d+(?:\.\d+)?)/);
            if (mathMatch) {
                const [, a, op, b] = mathMatch;
                if (op === '+') return aiResponses.math.add(a, b);
                if (op === '-') return aiResponses.math.subtract(a, b);
                if (op === '×') return aiResponses.math.multiply(a, b);
                if (op === '÷') return aiResponses.math.divide(a, b);
            }
            
            // Coding help
            if (msg.includes('code') || msg.includes('javascript') || msg.includes('python') || msg.includes('html')) {
                return aiResponses.coding[Math.floor(Math.random() * aiResponses.coding.length)];
            }
            
            // Creative requests
            if (msg.includes('story') || msg.includes('poem') || msg.includes('write')) {
                return aiResponses.creative[Math.floor(Math.random() * aiResponses.creative.length)];
            }
            
            // Facts
            if (msg.includes('fact') || msg.includes('tell me something')) {
                return aiResponses.facts[Math.floor(Math.random() * aiResponses.facts.length)];
            }
            
            // Default intelligent responses
            const defaultResponses = [
                `Interesting question: "${userMessage}". Let me think... In general, this relates to ${getTopic(userMessage)}. Can you elaborate?`,
                `Great question! "${userMessage}" touches on important concepts. What specific aspect interests you most?`,
                `Fascinating! Regarding "${userMessage}", the key principle is understanding context. Want me to dive deeper?`,
                `I see you're curious about "${userMessage}". This is a rich topic! What's your goal with this knowledge?`
            ];
            
            return defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
        }

        function getTopic(msg) {
            if (msg.includes('code') || msg.includes('program')) return 'programming';
            if (msg.includes('math') || msg.includes('calculate')) return 'mathematics';
            if (msg.includes('history')) return 'historical events';
            if (msg.includes('science')) return 'scientific principles';
            return 'various domains of knowledge';
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
            scrollBtn.classList.remove('show');
        }

        function handleScroll() {
            const { scrollTop, scrollHeight, clientHeight } = chatContainer;
            scrollBtn.classList.toggle('show', scrollTop + clientHeight < scrollHeight - 50);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            userInput.value = '';
            sendBtn.disabled = true;

            const typingIndicator = showTypingIndicator();

            // Simulate AI thinking time
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 1200));

            removeTypingIndicator();
            const response = generateAIResponse(message);
            addMessage(response);

            sendBtn.disabled = false;
            userInput.focus();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', () => {
            sendBtn.disabled = userInput.value.trim() === '';
        });

        chatContainer.addEventListener('scroll', handleScroll);

        // Focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });

        // Allow clicking outside to focus input
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.container')) {
                userInput.focus();
            }
        });
    </script>
</body>
</html>
