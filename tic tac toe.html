<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Ultimate Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .game-modes {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .mode-btn:hover, .mode-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 30px auto;
            width: 360px;
            height: 360px;
            max-width: 90vw;
            max-height: 90vw;
        }

        .cell {
            background: linear-gradient(135deg, #f8f9ff, #e8ecff);
            border: 3px solid #e1e5ff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .cell.x {
            color: #e74c3c;
            animation: drawX 0.4s ease;
        }

        .cell.o {
            color: #3498db;
            animation: drawO 0.4s ease;
        }

        @keyframes drawX {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(45deg); }
            100% { transform: scale(1) rotate(45deg); }
        }

        @keyframes drawO {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.2em;
            font-weight: 600;
        }

        .scores {
            display: flex;
            gap: 30px;
        }

        .score {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .score-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .score-value {
            font-size: 1.8em;
            font-weight: 800;
        }

        .player-x .score-value { color: #e74c3c; }
        .player-o .score-value { color: #3498db; }
        .ai .score-value { color: #f39c12; }

        .current-turn {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            min-width: 120px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .winner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .winner-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .winner-message {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 20px;
            color: #333;
        }

        .win-line {
            position: absolute;
            width: 6px;
            height: 100%;
            background: linear-gradient(135deg, #e74c3c, #f39c12);
            border-radius: 3px;
            transform-origin: center;
            animation: winLine 0.6s ease-out;
        }

        @keyframes winLine {
            0% { transform: scaleY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scaleY(1); }
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .game-board { width: 280px; height: 280px; gap: 8px; }
            .cell { font-size: 2.5em; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Tic Tac Toe</h1>
        <div class="subtitle">Play against AI or challenge a friend!</div>

        <div class="game-modes">
            <button class="mode-btn active" data-mode="pvp">👥 Player vs Player</button>
            <button class="mode-btn" data-mode="pve">🤖 Player vs AI</button>
        </div>

        <div class="game-info">
            <div class="scores">
                <div class="score player-x">
                    <div class="score-label">Player X</div>
                    <div class="score-value" id="scoreX">0</div>
                </div>
                <div class="score" id="scoreAI" style="display: none;">
                    <div class="score-label">AI</div>
                    <div class="score-value ai" id="scoreAIValue">0</div>
                </div>
                <div class="score player-o">
                    <div class="score-label">Player O</div>
                    <div class="score-value" id="scoreO">0</div>
                </div>
            </div>
        </div>

        <div class="current-turn" id="currentTurn">Player X's Turn</div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="controls">
            <button class="btn btn-secondary" id="newGameBtn">New Game</button>
            <button class="btn btn-primary" id="resetScoresBtn">Reset Scores</button>
        </div>
    </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = Array(9).fill(null);
                this.currentPlayer = 'X';
                this.gameMode = 'pvp';
                this.scores = { X: 0, O: 0, AI: 0 };
                this.gameActive = true;
                this.aiThinking = false;

                this.init();
            }

            init() {
                this.bindEvents();
                this.updateDisplay();
                this.updateScores();
            }

            bindEvents() {
                // Mode selection
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.gameMode = e.target.dataset.mode;
                        this.resetGame();
                        this.updateScoreDisplay();
                    });
                });

                // Cell clicks
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.addEventListener('click', (e) => this.handleCellClick(e));
                });

                // Buttons
                document.getElementById('newGameBtn').addEventListener('click', () => this.resetGame());
                document.getElementById('resetScoresBtn').addEventListener('click', () => this.resetScores());
            }

            handleCellClick(e) {
                const cell = e.target;
                const index = parseInt(cell.dataset.index);

                if (this.board[index] || !this.gameActive || 
                    (this.gameMode === 'pve' && this.currentPlayer === 'O' && !this.aiThinking)) {
                    return;
                }

                this.makeMove(index, this.currentPlayer);
                this.checkGameState();

                if (this.gameMode === 'pve' && this.currentPlayer === 'O' && this.gameActive) {
                    this.aiMove();
                }
            }

            makeMove(index, player) {
                this.board[index] = player;
                document.querySelector(`[data-index="${index}"]`).classList.add(player.toLowerCase());
                
                // Winning line animation
                if (this.checkWinner()) {
                    this.showWinLine();
                }
            }

            aiMove() {
                if (!this.gameActive) return;

                this.aiThinking = true;
                document.getElementById('currentTurn').textContent = "🤖 AI Thinking...";

                setTimeout(() => {
                    const bestMove = this.getBestMove();
                    this.makeMove(bestMove, 'O');
                    this.checkGameState();
                    this.aiThinking = false;
                }, 500 + Math.random() * 800);
            }

            getBestMove() {
                // Minimax algorithm for unbeatable AI
                let bestScore = -Infinity;
                let move;

                for (let i = 0; i < 9; i++) {
                    if (!this.board[i]) {
                        this.board[i] = 'O';
                        let score = this.minimax(this.board, 0, false);
                        this.board[i] = null;
                        
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                return move;
            }

            minimax(newBoard, depth, isMaximizing) {
                const result = this.checkWinner(newBoard);

                if (result === 'O') return 10 - depth;
                if (result === 'X') return depth - 10;
                if (this.isBoardFull(newBoard)) return 0;

                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (!newBoard[i]) {
                            newBoard[i] = 'O';
                            bestScore = Math.max(score, this.minimax(newBoard, depth + 1, false));
                            newBoard[i] = null;
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (!newBoard[i]) {
                            newBoard[i] = 'X';
                            bestScore = Math.min(score, this.minimax(newBoard, depth + 1, true));
                            newBoard[i] = null;
                        }
                    }
                    return bestScore;
                }
            }

            checkGameState() {
                const winner = this.checkWinner();
                
                if (winner) {
                    this.gameActive = false;
                    this.scores[winner]++;
                    this.updateScores();
                    
                    const message = winner === 'X' ? "Player X Wins! 🎉" : 
                                  this.gameMode === 'pve' ? "AI Wins! 🤖" : "Player O Wins! 🎉";
                    
                    document.getElementById('currentTurn').innerHTML = 
                        `<span class="winner-message">${message}</span>`;
                    return;
                }

                if (this.isBoardFull()) {
                    this.gameActive = false;
                    document.getElementById('currentTurn').textContent = "It's a Draw! 🤝";
                    return;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                this.updateDisplay();
            }

            checkWinner(board = this.board) {
                const winConditions = [
                    [0,1,2], [3,4,5], [6,7,8], // rows
                    [0,3,6], [1,4,7], [2,5,8], // columns
                    [0,4,8], [2,4,6] // diagonals
                ];

                for (let condition of winConditions) {
                    const [a, b, c] = condition;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                return null;
            }

            isBoardFull(board = this.board) {
                return board.every(cell => cell !== null);
            }

            showWinLine() {
                const winner = this.checkWinner();
                const winConditions = [
                    [0,1,2], [3,4,5], [6,7,8],
                    [0,3,6], [1,4,7], [2,5,8],
                    [0,4,8], [2,4,6]
                ];

                for (let condition of winConditions) {
                    const [a, b, c] = condition;
                    if (this.board[a] === winner) {
                        const line = document.createElement('div');
                        line.className = 'win-line';
                        
                        // Position line based on win condition
                        const boardRect = document.getElementById('gameBoard').getBoundingClientRect();
                        const cellSize = boardRect.width / 3;
                        
                        if ([0,1,2].includes(a)) line.style.top = '6px'; // row
                        else if ([6,7,8].includes(a)) line.style.bottom = '6px';
                        else if ([0,3,6].includes(a)) line.style.left = '6px'; // col
                        else if ([2,5,8].includes(a)) line.style.right = '6px';
                        else line.style.transform = 'rotate(45deg)'; // diagonal
                        
                        document.querySelector('.game-board').appendChild(line);
                        break;
                    }
                }
            }

            updateDisplay() {
                const turnText = this.gameMode === 'pve' && this.currentPlayer === 'O' ? 
                    '🤖 AI\'s Turn' : `${this.currentPlayer}'s Turn`;
                document.getElementById('currentTurn').textContent = turnText;
            }

            updateScoreDisplay() {
                const aiScore = document.getElementById('scoreAI');
                const aiScoreValue = document.getElementById('scoreAIValue');
                
                if (this.gameMode === 'pve') {
                    aiScore.style.display = 'block';
                    document.querySelector('.player-o .score-label').textContent = 'Player 2';
                } else {
                    aiScore.style.display = 'none';
                    document.querySelector('.player-o .score-label').textContent = 'Player O';
                }
            }

            updateScores() {
                document.getElementById('scoreX').textContent = this.scores.X;
                document.getElementById('scoreO').textContent = this.scores.O;
                if (this.gameMode === 'pve') {
                    document.getElementById
                }
            </script>
        </body>
</html>
